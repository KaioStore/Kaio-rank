<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Kaio Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #0a0a0a, #111);
  color: white;
  text-align: center;
}

/* TOPO */
.topo {
  padding: 25px;
  font-size: 32px;
  font-weight: bold;
  letter-spacing: 1px;
}

/* PERFIL */
.perfil-box {
  margin-top: 40px;
}

/* AVATAR */
#avatar {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  border: 3px solid #333;
  transition: 0.3s;
}

#avatar:hover {
  transform: scale(1.08);
  box-shadow: 0 0 20px rgba(255,255,255,0.15);
}

/* NOME */
#nome {
  margin-top: 15px;
  font-size: 28px;
  text-shadow: 0 0 10px rgba(255,255,255,0.15);
}

/* POSIÇÃO */
#posicao {
  color: #aaa;
  margin-bottom: 25px;
}

/* CARDS */
.card {
  width: 90%;
  max-width: 440px;
  margin: 15px auto;
  padding: 22px;
  border-radius: 14px;
  font-size: 18px;
  transition: 0.25s;
}

/* PRETO */
.card-azul {
  background: #141414;
  border-left: 3px solid #555;
}

/* CINZA */
.card-dourado {
  background: #1c1c1c;
  border-left: 3px solid #777;
}

/* HOVER PREMIUM */
.card:hover {
  transform: scale(1.03);
  box-shadow: 0 0 25px rgba(255,255,255,0.06);
}
</style>

</head>

<body>

<!-- TOPO -->
<div class="topo">
  Kaio Store
</div>

<!-- PERFIL -->
<div id="perfil" class="perfil-box">

  <img id="avatar">

  <h1 id="nome"></h1>
  <p id="posicao"></p>

  <div class="card card-azul">
    💰 Total gasto<br>
    <span id="total"></span>
  </div>

  <div class="card card-dourado">
    👑 VIP atual<br>
    <span id="vip"></span>
  </div>

</div>

<script>
const API = "https://attractive-analysis-production-b8e2.up.railway.app";

/* PEGAR ID */
function pegarID() {
  const url = new URL(window.location.href);
  return url.searchParams.get("id");
}

/* CARREGAR PERFIL */
async function carregarPerfil(id) {
  try {
    const res = await fetch(API + "/perfil/" + id);
    const data = await res.json();

    document.getElementById("avatar").src = data.avatar;
    document.getElementById("nome").innerText = data.nome;
    document.getElementById("total").innerText = "R$" + data.total;
    document.getElementById("vip").innerText = data.vip || "Sem cargo";
    document.getElementById("posicao").innerText = "#" + data.posicao + " no ranking";

  } catch {
    document.getElementById("perfil").innerHTML = "<h2>Erro ao carregar</h2>";
  }
}

/* START */
window.addEventListener("DOMContentLoaded", () => {
  const id = pegarID();

  if (id) {
    carregarPerfil(id);
  } else {
    document.getElementById("perfil").innerHTML = "<h2>Nenhum usuário selecionado</h2>";
  }
});
</script>

</body>
</html>
