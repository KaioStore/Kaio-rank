<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Kaio Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#071a2f, #020c18);
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 30px;
  align-items: center;
}

.logo {
  font-size: 26px;
  font-weight: bold;
}

.login {
  background: #2b4d7c;
  padding: 12px 22px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 16px;
}

/* CENTRALIZAÇÃO TOP */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 80vh;
  padding: 20px;
}

/* AVATAR */
.avatar {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  border: 5px solid gold;
  margin-bottom: 10px;
}

/* TEXTO */
.nome {
  font-size: 30px;
  font-weight: bold;
}

.posicao {
  color: gold;
  font-size: 18px;
  margin-bottom: 20px;
}

/* CARDS */
.card {
  width: 90%;
  max-width: 400px;
  padding: 22px;
  border-radius: 16px;
  margin: 8px 0;
  text-align: center;
  font-size: 18px;
}

.gasto {
  background: #1e3a5f;
}

.vip {
  background: linear-gradient(45deg, #8a6d1d, #cfa62f);
}

/* BOTÃO */
.botao {
  margin-top: 18px;
  width: 90%;
  max-width: 400px;
  padding: 18px;
  border-radius: 12px;
  background: #3d5c86;
  cursor: pointer;
  font-size: 18px;
  text-align: center;
}

/* RANK */
.ranking {
  margin-top: 40px;
  text-align: center;
}

.item {
  margin: 10px auto;
  padding: 12px;
  width: 90%;
  max-width: 400px;
  background: #1a2f4d;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <div class="logo">Kaio Store</div>
  <div class="login" onclick="loginDiscord()">Minha Conta</div>
</header>

  <div class="nome" id="nome">Carregando...</div>
  <div class="posicao" id="posicao
