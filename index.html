<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Kaio Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#071a2f, #020c18);
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 25px 35px;
  align-items: center;
}

.logo {
  font-size: 34px;
  font-weight: bold;
}

.login {
  background: #2b4d7c;
  padding: 16px 28px;
  border-radius: 14px;
  cursor: pointer;
  font-size: 18px;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 60px;
  text-align: center;
}

.avatar {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  border: 6px solid gold;
  margin-bottom: 10px;
}

.nome {
  font-size: 34px;
  font-weight: bold;
}

.posicao {
  color: gold;
  font-size: 20px;
  margin-bottom: 20px;
}

.card {
  width: 96%; /* 🔥 AUMENTADO DE VERDADE */
  padding: 28px;
  border-radius: 20px;
  margin: 10px 0;
  text-align: center;
  font-size: 22px;
}

.gasto {
  background: #1e3a5f;
}

.vip {
  background: linear-gradient(45deg, #8a6d1d, #cfa62f);
}

.botao {
  margin-top: 18px;
  width: 95%;
  max-width: 600px;
  padding: 22px;
  border-radius: 16px;
  background: #3d5c86;
  cursor: pointer;
  font-size: 22px;
  text-align: center;
}

.ranking {
  margin-top: 40px;
  text-align: center;
}

.item {
  margin: 10px auto;
  padding: 14px;
  width: 92%;
  max-width: 480px;
  background: #1a2f4d;
  border-radius: 12px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <div class="logo">Kaio Store</div>
  <div class="login" onclick="loginDiscord()">Minha Conta</div>
</header>

<div class="container" id="perfil">
  <img class="avatar" id="avatar">
  <div class="nome" id="nome">Carregando...</div>
  <div class="posicao" id="posicao"></div>

  <div class="card gasto">
    💰 Total gasto
    <div id="total">R$0</div>
  </div>

  <div class="card vip">
    👑 VIP atual
    <div id="vip">Carregando</div>
  </div>

  <div class="botao" onclick="voltar()">Voltar ao Ranking</div>
</div>

<div class="ranking" id="ranking"></div>

<script>
const API = "https://attractive-analysis-production-b8e2.up.railway.app";

function pegarToken() {
  const hash = window.location.hash;

  if (hash.includes("access_token")) {
    const params = new URLSearchParams(hash.substring(1));
    const token = params.get("access_token");

    localStorage.setItem("discord_token", token);
    window.location.hash = "";
    return token;
  }

  return localStorage.getItem("discord_token");
}

/* 🔥 NOVO: FUNÇÃO PRA MOSTRAR DADOS DO DISCORD */
function mostrarDiscord(user) {
  document.getElementById("nome").innerText = user.username;

  if (user.avatar) {
    document.getElementById("avatar").src =
      `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
  }

  document.getElementById("posicao").innerText = "Conta conectada";
}

/* 🔥 ATUALIZADA */
async function pegarUsuarioDiscord() {
  const token = pegarToken();
  if (!token) return;

  const res = await fetch("https://discord.com/api/users/@me", {
    headers: {
      Authorization: "Bearer " + token
    }
  });

  const user = await res.json();

  const botao = document.querySelector(".login");
  botao.innerText = user.username;

  // 🔥 LOGOUT AO CLICAR
  botao.onclick = () => {
    localStorage.removeItem("discord_token");
    location.reload();
  };

  // 🔥 MOSTRA DADOS SEM API
  mostrarDiscord(user);

  // 🔥 REDIRECIONA PRO PERFIL
  if (!window.location.search.includes("id=")) {
    window.location.href = "?id=" + user.id;
  }
}

function pegarID() {
  const url = new URL(window.location.href);
  return url.searchParams.get("id");
}

/* 🔥 MELHORADO */
async function carregarPerfil(id) {
  try {
    const res = await fetch(API + "/perfil/" + id);
    const data = await res.json();

    if (data && data.nome) {
      document.getElementById("avatar").src = data.avatar;
      document.getElementById("nome").innerText = data.nome;
      document.getElementById("total").innerText = "R$" + data.total;
      document.getElementById("vip").innerText = data.vip;

      if (data.posicao) {
        document.getElementById("posicao").innerText = "#" + data.posicao + " no ranking";
      }
    }
  } catch (e) {
    console.log("API falhou, usando Discord");
  }
}

async function carregarRanking() {
  const res = await fetch(API + "/ranking");
  const data = await res.json();

  const div = document.getElementById("ranking");

  data.forEach((user, i) => {
    div.innerHTML += `
      <div class="item" onclick="abrir('${user.id}')">
        ${i+1}. ${user.nome} - R$${user.total}
      </div>
    `;
  });
}

function abrir(id) {
  window.location.href = "?id=" + id;
}

function voltar() {
  window.location.href = "/";
}

function loginDiscord() {
  window.location.href =
    "https://discord.com/oauth2/authorize" +
    "?client_id=1485623307364466861" +
    "&response_type=token" +
    "&scope=identify" +
    "&redirect_uri=" + encodeURIComponent(window.location.origin);
}

const id = pegarID();

if (id) {
  document.getElementById("ranking").style.display = "none";
  carregarPerfil(id);
} else {
  document.getElementById("perfil").style.display = "none";
  carregarRanking();
}

pegarUsuarioDiscord();
</script>

</body>
</html>
