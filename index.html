<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ranking</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: linear-gradient(180deg, #0a2540, #000);
  text-align: center;
}

.topo {
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

.botao {
  background: #2a3f5f;
  padding: 10px 15px;
  border-radius: 10px;
  cursor: pointer;
}

#menu {
  display: none;
  position: absolute;
  right: 20px;
  top: 70px;
  background: #2a3f5f;
  padding: 10px;
  border-radius: 10px;
}

.perfil-box {
  margin-top: 30px;
}

#avatar {
  width: 120px;
  border-radius: 50%;
  border: 4px solid gold;
}

.card {
  margin: 20px auto;
  width: 80%;
  max-width: 300px;
  padding: 20px;
  border-radius: 15px;
}

.card-azul {
  background: #2a3f5f;
}

.card-dourado {
  background: linear-gradient(90deg, #a67c00, #ffcc00);
  color: black;
}

.item {
  background: #1a2c44;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
}
</style>

</head>

<body>

<!-- TOPO -->
<div class="topo">
  <h2>Kaio Store</h2>

  <div onclick="toggleMenu()" class="botao" id="loginText">
    Login
  </div>
</div>

<div id="menu"></div>

<!-- RANKING -->
<div id="ranking"></div>

<!-- PERFIL -->
<div id="perfil" class="perfil-box">

  <img id="avatar">

  <h1 id="nome"></h1>
  <p id="posicao"></p>

  <div class="card card-azul">
    💰 Total gasto<br>
    <span id="total"></span>
  </div>

  <div class="card card-dourado">
    👑 VIP atual<br>
    <span id="vip"></span>
  </div>

  <div class="botao" onclick="voltar()">
    Voltar ao Ranking
  </div>

</div>

<script>
const API = "https://attractive-analysis-production-b8e2.up.railway.app";

let usuarioLogado = null;

function pegarToken() {
  const hash = window.location.hash;

  if (hash.includes("access_token")) {
    const params = new URLSearchParams(hash.substring(1));
    const token = params.get("access_token");

    localStorage.setItem("discord_token", token);
    window.location.hash = "";
    window.location.href = "?reload=1";
    return token;
  }

  return localStorage.getItem("discord_token");
}

function atualizarBotaoLogin(user) {
  const btn = document.getElementById("loginText");
  const menu = document.getElementById("menu");

  if (!btn || !menu) return;

  if (user) {
    btn.innerText = "Minha Conta";
    menu.innerHTML = `
      <div style="margin-bottom:8px;">${user.username}</div>
      <div onclick="logout()">Sair</div>
    `;
  } else {
    btn.innerText = "Login";
    menu.innerHTML = `
      <div onclick="loginDiscord()">Entrar com Discord</div>
    `;
  }
}

function logout() {
  localStorage.removeItem("discord_token");
  location.reload();
}

function toggleMenu() {
  const token = localStorage.getItem("discord_token");

  if (!token) {
    loginDiscord();
    return;
  }

  const menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

async function pegarUsuarioDiscord() {
  const token = pegarToken();

  if (!token) {
    atualizarBotaoLogin(null);
    return;
  }

  try {
    const res = await fetch("https://discord.com/api/users/@me", {
      headers: { Authorization: "Bearer " + token }
    });

    const user = await res.json();
    usuarioLogado = user;

    atualizarBotaoLogin(user);
  } catch {
    atualizarBotaoLogin(null);
  }
}

function pegarID() {
  const url = new URL(window.location.href);
  return url.searchParams.get("id");
}

async function carregarPerfil(id) {
  try {
    const res = await fetch(API + "/perfil/" + id);
    const data = await res.json();

    document.getElementById("avatar").src = data.avatar;
    document.getElementById("nome").innerText = data.nome;
    document.getElementById("total").innerText = "R$" + data.total;
    document.getElementById("vip").innerText = data.vip;
    document.getElementById("posicao").innerText = "#" + data.posicao;

  } catch {
    document.getElementById("perfil").innerText = "Erro ao carregar";
  }
}

async function carregarRanking() {
  try {
    const res = await fetch(API + "/ranking");
    const data = await res.json();

    const div = document.getElementById("ranking");
    div.innerHTML = "";

    data.forEach((user, i) => {
      div.innerHTML += `
        <div class="item" onclick="abrir('${user.id}')">
          ${i+1}. ${user.nome} - R$${user.total}
        </div>
      `;
    });

  } catch {
    document.getElementById("ranking").innerText = "Erro ao carregar ranking";
  }
}

function abrir(id) {
  window.location.href = "?id=" + id;
}

function voltar() {
  window.location.href = "/";
}

function loginDiscord() {
  window.location.href =
    "https://discord.com/oauth2/authorize" +
    "?client_id=1485623307364466861" +
    "&response_type=token" +
    "&scope=identify" +
    "&redirect_uri=" + encodeURIComponent(window.location.origin);
}

window.addEventListener("DOMContentLoaded", () => {

  const id = pegarID();

  if (id) {
    document.getElementById("ranking").style.display = "none";
    carregarPerfil(id);
  } else {
    document.getElementById("perfil").style.display = "none";
    carregarRanking();
  }

  pegarUsuarioDiscord();
});
</script>

</body>
</html>
