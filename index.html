<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Kaio Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b; /* LISO */
  color: white;
  text-align: center;
}

/* TOPO */
.topo {
  padding: 25px;
  font-size: 34px;
  font-weight: bold;
}

/* PERFIL */
.perfil-box {
  margin-top: 30px;
}

/* AVATAR */
#avatar {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  border: 2px solid #333;
}

/* NOME */
#nome {
  margin-top: 15px;
  font-size: 30px;
}

/* POSIÇÃO */
#posicao {
  color: #aaa;
  margin-bottom: 25px;
}

/* CARDS */
.card {
  width: 95%;
  max-width: 600px; /* MAIOR */
  margin: 12px auto;
  padding: 28px; /* MAIS ESPAÇO */
  border-radius: 16px;
  font-size: 20px;
}

/* PRETO */
.card-azul {
  background: #141414;
}

/* CINZA */
.card-dourado {
  background: #1c1c1c;
}
</style>

</head>

<body>

<!-- TOPO -->
<div class="topo">
  Kaio Store
</div>

<!-- PERFIL -->
<div id="perfil" class="perfil-box">

  <img id="avatar">

  <h1 id="nome"></h1>
  <p id="posicao"></p>

  <div class="card card-azul">
    💰 Total gasto<br>
    <span id="total"></span>
  </div>

  <div class="card card-dourado">
    👑 VIP atual<br>
    <span id="vip"></span>
  </div>

</div>

<script>
const API = "https://attractive-analysis-production-b8e2.up.railway.app";

/* PEGAR ID */
function pegarID() {
  const url = new URL(window.location.href);
  return url.searchParams.get("id");
}

/* CARREGAR PERFIL */
async function carregarPerfil(id) {
  try {
    const res = await fetch(API + "/perfil/" + id);
    const data = await res.json();

    document.getElementById("avatar").src = data.avatar;
    document.getElementById("nome").innerText = data.nome;
    document.getElementById("total").innerText = "R$" + data.total;
    document.getElementById("vip").innerText = data.vip || "Sem cargo";
    document.getElementById("posicao").innerText = "#" + data.posicao + " no ranking";

  } catch {
    document.getElementById("perfil").innerHTML = "<h2>Erro ao carregar</h2>";
  }
}

/* START */
window.addEventListener("DOMContentLoaded", () => {
  const id = pegarID();

  if (id) {
    carregarPerfil(id);
  } else {
    document.getElementById("perfil").innerHTML = "<h2>Nenhum usuário selecionado</h2>";
  }
});
</script>

</body>
</html>
