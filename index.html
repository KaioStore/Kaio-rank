<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Kaio Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #02142b, #000);
  color: white;
}

/* TOPO */
.topo {
  display: flex;
  justify-content: space-between;
  padding: 25px;
  align-items: center;
}

.menu {
  display: flex;
  gap: 20px;
}

.menu span {
  cursor: pointer;
  opacity: 0.7;
}

.menu span:hover {
  opacity: 1;
}

/* CONTAINER */
.container {
  display: flex;
  justify-content: center;
  margin-top: 40px;
}

.card {
  width: 600px;
  background: #0b1220;
  padding: 50px;
  border-radius: 25px;
  text-align: center;
  box-shadow: 0 0 50px rgba(0,0,0,0.7);
}

/* AVATAR */
.avatar {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  border: 5px solid gold;
  object-fit: cover;
}

/* NOME */
.nome {
  font-size: 32px;
  margin-top: 15px;
}

/* RANK */
.rank {
  color: gold;
  font-size: 18px;
  margin-bottom: 20px;
}

/* BOXES */
.boxes {
  display: flex;
  gap: 20px;
  margin-top: 25px;
}

.box {
  flex: 1;
  padding: 25px;
  border-radius: 15px;
  font-size: 16px;
}

/* CORES */
.gasto {
  background: linear-gradient(135deg, #0b3c6f, #061f3a);
}

.vip {
  background: linear-gradient(135deg, #5a4300, #2c1f00);
}

/* TEXTO */
.valor {
  font-size: 28px;
  margin-top: 10px;
}

/* FRASE */
.msg {
  margin-top: 25px;
  opacity: 0.7;
}

/* BOTÃO */
.botao {
  margin-top: 30px;
  padding: 18px;
  border-radius: 15px;
  background: linear-gradient(135deg, #1e3a5f, #295c99);
  cursor: pointer;
  font-size: 16px;
  transition: 0.2s;
}

.botao:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="topo">
  <h2>Kaio Store</h2>

  <div class="menu">
    <span onclick="window.open('#')">Ranking</span>
    <span onclick="window.open('#')">Benefícios</span>
    <span onclick="window.open('#')">Suporte</span>
    <span onclick="window.open('https://discord.com')">Minha Conta</span>
  </div>
</div>

<div class="container">
  <div class="card">

    <!-- AVATAR -->
    <img id="avatar" class="avatar" src="https://cdn.discordapp.com/embed/avatars/0.png">

    <!-- NOME -->
    <div id="nome" class="nome">Carregando...</div>

    <!-- RANK -->
    <div id="rank" class="rank"></div>

    <!-- BOXES -->
    <div class="boxes">

      <div class="box gasto">
        💰 TOTAL GASTO
        <div id="total" class="valor">--</div>
      </div>

      <div class="box vip">
        👑 VIP ATUAL
        <div id="vip" class="valor">--</div>
      </div>

    </div>

    
    <!-- BOTÃO -->
    <div class="botao" onclick="window.location.href='https://kaio-rank.vercel.app'">
      Voltar ao Ranking
    </div>

  </div>
</div>

<script>
const id = new URLSearchParams(window.location.search).get("id");

const API = "https://attractive-analysis-production-b8e2.up.railway.app/perfil/";

if (!id) {
  document.getElementById("nome").innerText = "Usuário não encontrado";
} else {

  fetch(API + id)
  .then(res => res.json())
  .then(data => {

    if (data.erro) {
      document.getElementById("nome").innerText = "Perfil indisponível";
      return;
    }

    // NOME
    document.getElementById("nome").innerText = data.nome;

    // AVATAR
    if (data.avatar) {
      document.getElementById("avatar").src = data.avatar;
    }

    // TOTAL
    document.getElementById("total").innerText = "R$" + (data.total || 0);

    // VIP + REQUISITOS
    let vipTexto = "Sem cargo";

    if (data.vip === "Bronze") vipTexto = "Bronze (R$100)";
    else if (data.vip === "Prata") vipTexto = "Prata (R$300)";
    else if (data.vip === "Ouro") vipTexto = "Ouro (R$500)";
    else if (data.vip === "Diamante") vipTexto = "Diamante (R$1000)";

    document.getElementById("vip").innerText = vipTexto;

    // RANK
    if (data.posicao === 1) {
      document.getElementById("rank").innerText = "#1 👑";
    } else if (data.posicao) {
      document.getElementById("rank").innerText = "#" + data.posicao;
    } else {
      document.getElementById("rank").innerText = "Sem ranking";
    }

  })
  .catch(() => {
    document.getElementById("nome").innerText = "Erro na API";
  });

}
</script>

</body>
</html>
