<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Kaio Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  text-align: center;
}

/* TOPO */
.topo {
  padding: 25px;
  font-size: 32px;
  font-weight: bold;
}

/* PERFIL */
.perfil-box {
  margin-top: 30px;
}

#avatar {
  width: 130px;
  border-radius: 50%;
  margin-bottom: 10px;
}

#nome {
  font-size: 28px;
  margin: 10px 0;
}

#posicao {
  opacity: 0.7;
  margin-bottom: 20px;
}

/* CARDS */
.card {
  width: 320px;
  margin: 12px auto;
  padding: 20px;
  border-radius: 12px;
  font-size: 18px;
}

.card-azul {
  background: #1e3a8a;
}

.card-dourado {
  background: #b45309;
}

/* BOTAO */
.botao {
  margin-top: 25px;
  display: inline-block;
  padding: 12px 25px;
  background: #222;
  border-radius: 8px;
  cursor: pointer;
}
</style>

</head>

<body>

<!-- TOPO -->
<div class="topo">
  Kaio Store
</div>

<!-- PERFIL -->
<div id="perfil" class="perfil-box">

  <img id="avatar">

  <h1 id="nome"></h1>
  <p id="posicao"></p>

  <div class="card card-azul">
    💰 Total gasto<br>
    <span id="total"></span>
  </div>

  <div class="card card-dourado">
    👑 VIP atual<br>
    <span id="vip"></span>
  </div>

  <div class="botao" onclick="voltar()">
    Voltar ao Ranking
  </div>

</div>

<script>
const API = "https://attractive-analysis-production-b8e2.up.railway.app";

/* PEGAR ID */
function pegarID() {
  const url = new URL(window.location.href);
  return url.searchParams.get("id");
}

/* CARREGAR PERFIL */
async function carregarPerfil(id) {
  try {
    const res = await fetch(API + "/perfil/" + id);
    const data = await res.json();

    if (!data || data.erro) throw new Error();

    document.getElementById("avatar").src =
      data.avatar || "https://cdn-icons-png.flaticon.com/512/149/149071.png";

    document.getElementById("nome").innerText = data.nome || "Sem nome";
    document.getElementById("total").innerText = "R$" + (data.total || 0);
    document.getElementById("vip").innerText = data.vip || "Nenhum";

    if (data.posicao) {
      document.getElementById("posicao").innerText =
        "#" + data.posicao + " no ranking";
    }

  } catch {
    document.getElementById("perfil").innerHTML = `
      <h2>Erro ao carregar usuário</h2>
    `;
  }
}

/* VOLTAR */
function voltar() {
  window.location.href = "https://discord.com";
}

/* INICIO */
window.addEventListener("DOMContentLoaded", () => {
  const id = pegarID();

  if (id) {
    carregarPerfil(id);
  } else {
    document.getElementById("perfil").innerHTML = `
      <h2>Nenhum usuário selecionado</h2>
    `;
  }
});
</script>

</body>
</html>
