<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Kaio Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #0a0a0a, #111827);
  color: white;
}

/* TOPO */
.topo {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.botao {
  background: #1f2937;
  padding: 10px 18px;
  border-radius: 8px;
  cursor: pointer;
}

/* MENU */
#menu {
  position: absolute;
  right: 20px;
  top: 70px;
  background: #111827;
  border-radius: 10px;
  padding: 10px;
  display: none;
}

/* PERFIL */
.perfil-box {
  text-align: center;
  margin-top: 40px;
}

#avatar {
  width: 120px;
  border-radius: 50%;
  border: 3px solid gold;
}

#nome {
  margin: 10px 0;
}

/* CARDS GRANDES */
.card {
  width: 85%;
  max-width: 400px;
  margin: 20px auto;
  padding: 25px;
  border-radius: 12px;
  font-size: 18px;
}

.card-azul {
  background: #1f2937;
}

.card-dourado {
  background: #b48a1e;
  color: black;
}

</style>
</head>

<body>

<!-- TOPO -->
<div class="topo">
  <div class="logo">Kaio Store</div>

  <div onclick="toggleMenu()" class="botao" id="loginText">
    Login
  </div>
</div>

<div id="menu"></div>

<!-- PERFIL -->
<div id="perfil" class="perfil-box">

  <img id="avatar">

  <h1 id="nome"></h1>
  <p id="posicao"></p>

  <div class="card card-azul">
    💰 Total gasto<br>
    <span id="total"></span>
  </div>

  <div class="card card-dourado">
    👑 VIP atual<br>
    <span id="vip"></span>
  </div>

</div>

<script>
const API = "https://attractive-analysis-production-b8e2.up.railway.app";

let usuarioLogado = null;

/* TOKEN */
function pegarToken() {
  const hash = window.location.hash;

  if (hash.includes("access_token")) {
    const params = new URLSearchParams(hash.substring(1));
    const token = params.get("access_token");

    localStorage.setItem("discord_token", token);
    window.location.hash = "";
    window.location.reload();
    return token;
  }

  return localStorage.getItem("discord_token");
}

/* LOGIN BOTÃO */
function atualizarBotaoLogin(user) {
  const btn = document.getElementById("loginText");
  const menu = document.getElementById("menu");

  if (user) {
    btn.innerText = "Minha Conta";
    menu.innerHTML = `
      <div>${user.username}</div>
      <div onclick="logout()">Sair</div>
    `;
  } else {
    btn.innerText = "Login";
    menu.innerHTML = `
      <div onclick="loginDiscord()">Entrar com Discord</div>
    `;
  }
}

/* MENU */
function toggleMenu() {
  const menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

/* LOGOUT */
function logout() {
  localStorage.removeItem("discord_token");
  location.reload();
}

/* PEGAR USER */
async function pegarUsuarioDiscord() {
  const token = pegarToken();

  if (!token) {
    atualizarBotaoLogin(null);
    return;
  }

  try {
    const res = await fetch("https://discord.com/api/users/@me", {
      headers: { Authorization: "Bearer " + token }
    });

    const user = await res.json();
    usuarioLogado = user;

    atualizarBotaoLogin(user);
  } catch {
    atualizarBotaoLogin(null);
  }
}

/* PERFIL */
async function carregarPerfil() {
  try {
    const res = await fetch(API + "/ranking");
    const data = await res.json();

    const top = data[0]; // pega só o primeiro

    document.getElementById("avatar").src = top.avatar;
    document.getElementById("nome").innerText = top.nome;
    document.getElementById("total").innerText = "R$" + top.total;
    document.getElementById("vip").innerText = top.vip;
    document.getElementById("posicao").innerText = "#1 no ranking";

  } catch {
    document.getElementById("perfil").innerText = "Erro ao carregar";
  }
}

/* LOGIN DISCORD */
function loginDiscord() {
  window.location.href =
    "https://discord.com/oauth2/authorize" +
    "?client_id=1485623307364466861" +
    "&response_type=token" +
    "&scope=identify" +
    "&redirect_uri=" + encodeURIComponent(window.location.origin);
}

/* START */
window.onload = () => {
  pegarUsuarioDiscord();
  carregarPerfil();
};
</script>

</body>
</html>
