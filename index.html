<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ranking</title>

  <style>
    body {
      background: #0d0d0d;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .item {
      background: #1a1a1a;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
      cursor: pointer;
    }

    .item:hover {
      background: #2a2a2a;
    }

    img {
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <h1>Ranking</h1>

  <!-- 🔥 RANKING -->
  <div id="ranking"></div>

  <!-- 🔥 PERFIL -->
  <div id="perfil">
    <img id="avatar" width="100" style="border-radius:50%">
    <h1 id="nome"></h1>
    <p id="total"></p>
    <p id="vip"></p>
    <p id="posicao"></p>

    <div onclick="voltar()" style="margin-top:20px; cursor:pointer;">
      ← Voltar
    </div>
  </div>

  <!-- 🔥 SCRIPT (SEMPRE NO FINAL) -->
  <script>
  const API = "https://attractive-analysis-production-b8e2.up.railway.app";

  function pegarID() {
    const url = new URL(window.location.href);
    return url.searchParams.get("id");
  }

  async function carregarPerfil(id) {
    try {
      const res = await fetch(API + "/perfil/" + id);
      const data = await res.json();

      document.getElementById("avatar").src = data.avatar;
      document.getElementById("nome").innerText = data.nome;
      document.getElementById("total").innerText = "R$" + data.total;
      document.getElementById("vip").innerText = data.vip;
      document.getElementById("posicao").innerText = "#" + data.posicao;

    } catch {
      document.getElementById("perfil").innerText = "Erro ao carregar";
    }
  }

  async function carregarRanking() {
    try {
      const res = await fetch(API + "/ranking");
      const data = await res.json();

      const div = document.getElementById("ranking");
      div.innerHTML = "";

      data.forEach((user, i) => {
        div.innerHTML += `
          <div class="item" onclick="abrir('${user.id}')">
            ${i+1}. ${user.nome} - R$${user.total}
          </div>
        `;
      });

    } catch {
      document.getElementById("ranking").innerText = "Erro ao carregar ranking";
    }
  }

  function abrir(id) {
    window.location.href = "?id=" + id;
  }

  function voltar() {
    window.location.href = "/";
  }

  // 🔥 INICIO
  const id = pegarID();

  if (id) {
    document.getElementById("ranking").style.display = "none";
    carregarPerfil(id);
  } else {
    document.getElementById("perfil").style.display = "none";
    carregarRanking();
  }
  </script>

</body>
</html>
