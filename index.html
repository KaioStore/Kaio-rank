<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ranking</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a2540;
  color: white;
  text-align: center;
}

/* TOPO */
.topo {
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

.botao {
  background: #243a5a;
  padding: 10px 15px;
  border-radius: 10px;
  cursor: pointer;
}

/* MENU */
#menu {
  display: none;
  position: absolute;
  right: 20px;
  top: 70px;
  background: #243a5a;
  padding: 10px;
  border-radius: 10px;
}

/* CARDS GRANDES */
.item {
  background: #1a2c44;
  margin: 20px auto;
  padding: 25px;
  border-radius: 18px;
  font-size: 20px;
  width: 92%;
  max-width: 550px;
  transition: 0.2s;
}

.item:hover {
  transform: scale(1.03);
  background: #223a5c;
}

/* PERFIL */
.perfil-box {
  margin-top: 30px;
}

#avatar {
  width: 120px;
  border-radius: 50%;
  border: 4px solid gold;
}

.card {
  margin: 20px auto;
  width: 80%;
  max-width: 320px;
  padding: 20px;
  border-radius: 15px;
}

.card-azul {
  background: #243a5a;
}

.card-dourado {
  background: #c9a227;
  color: black;
}
</style>

</head>

<body>

<div class="topo">
  <h2>Kaio Store</h2>

  <div onclick="toggleMenu()" class="botao" id="loginText">
    Kaio Store
  </div>
</div>

<div id="menu"></div>

<div id="ranking"></div>

<div id="perfil" class="perfil-box" style="display:none;">

  <img id="avatar">

  <h1 id="nome"></h1>
  <p id="posicao"></p>

  <div class="card card-azul">
    💰 Total gasto<br>
    <span id="total"></span>
  </div>

  <div class="card card-dourado">
    👑 VIP atual<br>
    <span id="vip"></span>
  </div>

  <div class="botao" onclick="voltar()">
    Voltar ao Ranking
  </div>

</div>

<script>
const API = "https://attractive-analysis-production-b8e2.up.railway.app";

/* TOKEN (CORRIGIDO) */
function pegarToken() {
  const hash = window.location.hash;

  if (hash.includes("access_token")) {
    const params = new URLSearchParams(hash.substring(1));
    const token = params.get("access_token");

    localStorage.setItem("discord_token", token);

    // remove hash sem quebrar layout
    window.history.replaceState({}, document.title, "/");

    return token;
  }

  return localStorage.getItem("discord_token");
}

/* LOGIN */
function atualizarBotaoLogin(user) {
  const btn = document.getElementById("loginText");
  const menu = document.getElementById("menu");

  if (!btn || !menu) return;

  if (user) {
    btn.innerText = "Minha Conta";

    menu.innerHTML = `
      <div style="margin-bottom:8px;">${user.username}</div>
      <div onclick="logout()">Sair</div>
    `;
  } else {
    btn.innerText = "Kaio Store";

    menu.innerHTML = `
      <div onclick="loginDiscord()">Entrar com Discord</div>
    `;
  }
}

function logout() {
  localStorage.removeItem("discord_token");
  location.reload();
}

/* MENU */
function toggleMenu() {
  const menu = document.getElementById("menu");

  menu.style.display =
    menu.style.display === "block" ? "none" : "block";
}

/* DISCORD */
async function pegarUsuarioDiscord() {
  const token = pegarToken();

  if (!token) {
    atualizarBotaoLogin(null);
    return;
  }

  try {
    const res = await fetch("https://discord.com/api/users/@me", {
      headers: { Authorization: "Bearer " + token }
    });

    const user = await res.json();
    atualizarBotaoLogin(user);

  } catch {
    atualizarBotaoLogin(null);
  }
}

/* ID */
function pegarID() {
  const url = new URL(window.location.href);
  return url.searchParams.get("id");
}

/* PERFIL */
async function carregarPerfil(id) {
  document.getElementById("ranking").style.display = "none";
  document.getElementById("perfil").style.display = "block";

  const res = await fetch(API + "/perfil/" + id);
  const data = await res.json();

  document.getElementById("avatar").src = data.avatar;
  document.getElementById("nome").innerText = data.nome;
  document.getElementById("total").innerText = "R$" + data.total;
  document.getElementById("vip").innerText = data.vip;
  document.getElementById("posicao").innerText =
    "#" + data.posicao + " no ranking";
}

/* RANKING */
async function carregarRanking() {
  const res = await fetch(API + "/ranking");
  const data = await res.json();

  const div = document.getElementById("ranking");
  div.innerHTML = "";

  data.forEach((user, i) => {
    div.innerHTML += `
      <div class="item" onclick="abrir('${user.id}')">
        ${i+1}. ${user.nome} - R$${user.total}
      </div>
    `;
  });
}

/* NAV */
function abrir(id) {
  window.location.href = "?id=" + id;
}

function voltar() {
  window.location.href = "/";
}

/* LOGIN DISCORD */
function loginDiscord() {
  window.location.href =
    "https://discord.com/oauth2/authorize" +
    "?client_id=1485623307364466861" +
    "&response_type=token" +
    "&scope=identify" +
    "&redirect_uri=" + encodeURIComponent(window.location.origin);
}

/* START */
window.addEventListener("DOMContentLoaded", () => {

  pegarToken(); // 🔥 importante

  const id = pegarID();

  if (id) {
    carregarPerfil(id);
  } else {
    carregarRanking();
  }

  pegarUsuarioDiscord();
});
</script>

</body>
</html>
