<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Kaio Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#071a2f, #020c18);
  color: white;
}

/* HEADER MAIOR */
header {
  display: flex;
  justify-content: space-between;
  padding: 25px 35px;
  align-items: center;
}

.logo {
  font-size: 32px; /* 🔥 MAIOR */
  font-weight: bold;
}

.login {
  background: #2b4d7c;
  padding: 14px 26px; /* 🔥 MAIOR */
  border-radius: 14px;
  cursor: pointer;
  font-size: 18px; /* 🔥 MAIOR */
}

/* CENTRALIZA */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 78vh;
  text-align: center;
}

/* AVATAR */
.avatar {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  border: 6px solid gold;
  margin-bottom: 12px;
}

/* NOME */
.nome {
  font-size: 34px; /* 🔥 MAIOR */
  font-weight: bold;
}

/* POSIÇÃO */
.posicao {
  color: gold;
  font-size: 20px;
  margin-bottom: 25px;
}

/* CARDS GRANDES MESMO */
.card {
  width: 92%;
  max-width: 480px; /* 🔥 MAIS LARGO */
  padding: 24px;
  border-radius: 18px;
  margin: 8px 0; /* 🔥 MAIS PRÓXIMO */
  text-align: center;
  font-size: 20px; /* 🔥 TEXTO MAIOR */
}

/* GASTO */
.gasto {
  background: #1e3a5f;
}

/* VIP */
.vip {
  background: linear-gradient(45deg, #8a6d1d, #cfa62f);
}

/* BOTÃO GRANDE */
.botao {
  margin-top: 15px;
  width: 92%;
  max-width: 480px;
  padding: 20px;
  border-radius: 14px;
  background: #3d5c86;
  cursor: pointer;
  font-size: 20px;
  text-align: center;
}

/* RANKING */
.ranking {
  margin-top: 40px;
  text-align: center;
}

/* ITENS */
.item {
  margin: 10px auto;
  padding: 14px;
  width: 92%;
  max-width: 480px;
  background: #1a2f4d;
  border-radius: 12px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <div class="logo">Kaio Store</div>
  <div class="login" onclick="loginDiscord()">Minha Conta</div>
</header>

<div class="container" id="perfil">
  <img class="avatar" id="avatar">
  <div class="nome" id="nome">Carregando...</div>
  <div class="posicao" id="posicao"></div>

  <div class="card gasto">
    💰 Total gasto
    <div id="total">R$0</div>
  </div>

  <div class="card vip">
    👑 VIP atual
    <div id="vip">Carregando</div>
  </div>

  <div class="botao" onclick="voltar()">Voltar ao Ranking</div>
</div>

<div class="ranking" id="ranking"></div>

<script>
const API = "https://attractive-analysis-production-b8e2.up.railway.app";

function pegarID() {
  const url = new URL(window.location.href);
  return url.searchParams.get("id");
}

async function carregarPerfil(id) {
  const res = await fetch(API + "/perfil/" + id);
  const data = await res.json();

  document.getElementById("avatar").src = data.avatar;
  document.getElementById("nome").innerText = data.nome;
  document.getElementById("total").innerText = "R$" + data.total;
  document.getElementById("vip").innerText = data.vip;

  if (data.posicao) {
    document.getElementById("posicao").innerText = "#" + data.posicao + " no ranking";
  }
}

async function carregarRanking() {
  const res = await fetch(API + "/ranking");
  const data = await res.json();

  const div = document.getElementById("ranking");

  data.forEach((user, i) => {
    div.innerHTML += `
      <div class="item" onclick="abrir('${user.id}')">
        ${i+1}. ${user.nome} - R$${user.total}
      </div>
    `;
  });
}

function abrir(id) {
  window.location.href = "?id=" + id;
}

function voltar() {
  window.location.href = "/";
}

function loginDiscord() {
  window.location.href = "https://discord.com/oauth2/authorize?client_id=1485623307364466861&response_type=token&redirect_uri=" + encodeURIComponent(window.location.href);
}

const id = pegarID();

if (id) {
  document.getElementById("ranking").style.display = "none";
  carregarPerfil(id);
} else {
  document.getElementById("perfil").style.display = "none";
  carregarRanking();
}
</script>

</body>
</html>
