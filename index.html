<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Kaio Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #02142b, #000);
  color: white;
}

.topo {
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

.btn {
  background: #1e3a5f;
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
}

.container {
  display: flex;
  justify-content: center;
  margin-top: 40px;
}

.card {
  background: #0b1220;
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  width: 350px;
}

.avatar {
  width: 120px;
  border-radius: 50%;
  border: 4px solid gold;
}

.nome {
  font-size: 24px;
}

.rank {
  color: gold;
}

.boxes {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.box {
  flex: 1;
  padding: 15px;
  border-radius: 10px;
}

.gasto { background: #0b3c6f; }
.vip { background: #5a4300; }

.voltar {
  margin-top: 20px;
  padding: 15px;
  background: #1e3a5f;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="topo">
  <h2>Kaio Rank</h2>
  <div class="btn" onclick="window.open('https://discord.com')">Minha Conta</div>
</div>

<div class="container">
  <div class="card">

    <img id="avatar" class="avatar">

    <div id="nome" class="nome"></div>
    <div id="rank" class="rank"></div>

    <div class="boxes">
      <div class="box gasto">
        Total:<br><b id="total"></b>
      </div>

      <div class="box vip">
        VIP:<br><b id="vip"></b>
      </div>
    </div>

    <div class="voltar" onclick="window.open('https://discord.com')">
      Voltar
    </div>

  </div>
</div>

<script>

const id = new URLSearchParams(window.location.search).get("id");

// 🔥 COLOCA SEU LINK DO REPLIT AQUI
const API = "https://SEU-LINK.replit.dev/perfil/";

fetch(API + id)
.then(res => res.json())
.then(data => {

  document.getElementById("nome").innerText = data.nome;
  document.getElementById("avatar").src = data.avatar;
  document.getElementById("total").innerText = "R$" + data.total;

  document.getElementById("vip").innerText =
    data.vip || "Sem cargo";

  if (data.posicao === 1) {
    document.getElementById("rank").innerText = "#1 👑";
  } else if (data.posicao) {
    document.getElementById("rank").innerText = "#" + data.posicao;
  }

});
</script>
  
<script>
const params = new URLSearchParams(window.location.search);
const userId = params.get("id");

if (userId) {
  fetch(`https://SEU-REPLIT.XXX.repl.co/perfil/${userId}`)
    .then(res => res.json())
    .then(data => {

      if (data.erro) return;

      // NOME
      document.getElementById("nome").innerText = data.nome;

      // AVATAR
      document.getElementById("avatar").src = data.avatar;

      // TOTAL
      document.getElementById("total").innerText = `R$${data.total}`;

      // POSIÇÃO
      document.getElementById("posicao").innerText =
        data.posicao ? `#${data.posicao} no ranking` : "Sem ranking";

      // VIP
      if (data.vip) {
        document.getElementById("vip").innerText = data.vip;
      } else {
        document.getElementById("vip").innerText = "Sem cargo";
      }

    })
    .catch(() => {
      console.log("Erro ao puxar dados");
    });
}
</script>
</body>
</html>
