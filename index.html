<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #071a2f, #020b18);
  color: white;
  text-align: center;
}

.container {
  margin-top: 50px;
}

.avatar {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  border: 5px solid gold;
  position: relative;
}

.coroa {
  position: absolute;
  top: -20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 30px;
}

.nome {
  font-size: 26px;
  margin-top: 10px;
}

.rank {
  color: gold;
  margin-bottom: 20px;
}

.boxes {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.box {
  padding: 20px;
  border-radius: 15px;
  width: 180px;
  cursor: pointer;
  transition: 0.2s;
}

.box:hover {
  transform: scale(1.05);
}

.azul {
  background: linear-gradient(145deg, #0a2c52, #133d73);
}

.dourado {
  background: linear-gradient(145deg, #5a4300, #a67c00);
}

.botao {
  margin-top: 30px;
  background: #2d4f7c;
  padding: 15px;
  border-radius: 10px;
  width: 250px;
  margin-left: auto;
  margin-right: auto;
  cursor: pointer;
  transition: 0.2s;
}

.botao:hover {
  background: #3d6aa3;
}
</style>

</head>
<body>

<div class="container">

  <div style="position: relative; display: inline-block;">
    <div class="coroa">👑</div>
    <img id="avatar" class="avatar" src="">
  </div>

  <div id="nome" class="nome">Carregando...</div>
  <div id="posicao" class="rank"></div>

  <div class="boxes">
    <div class="box azul" onclick="alert('Total gasto do usuário')">
      <div>💰 Total gasto</div>
      <strong id="total">R$0</strong>
    </div>

    <div class="box dourado" onclick="alert('Seu nível VIP')">
      <div>👑 VIP atual</div>
      <strong id="vip">Carregando</strong>
    </div>
  </div>

  <div class="botao" onclick="voltarRanking()">
    Voltar ao Ranking
  </div>

</div>

<script>
const id = new URLSearchParams(window.location.search).get("id");

fetch("https://SEU-LINK-RAILWAY.up.railway.app/perfil/" + id)
  .then(res => res.json())
  .then(data => {

    if (data.erro) {
      document.body.innerHTML = "Erro ao carregar";
      return;
    }

    document.getElementById("nome").innerText = data.nome;
    document.getElementById("avatar").src = data.avatar;
    document.getElementById("total").innerText = "R$" + data.total;
    document.getElementById("vip").innerText = data.vip;

    if (data.posicao) {
      document.getElementById("posicao").innerText = "#" + data.posicao + " no ranking";
    }

  });

function voltarRanking() {
  window.location.href = "https://kaio-rank.vercel.app/";
}
</script>

</body>
</html>
