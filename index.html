<script>
const API = "https://attractive-analysis-production-b8e2.up.railway.app";

let usuarioLogado = null;

/* 🔥 NOVO: FORÇA RELOAD APÓS LOGIN */
if (window.location.search.includes("reload")) {
  window.location.href = "/";
}

/* TOKEN */
function pegarToken() {
  const hash = window.location.hash;

  if (hash.includes("access_token")) {
    const params = new URLSearchParams(hash.substring(1));
    const token = params.get("access_token");

    localStorage.setItem("discord_token", token);
    window.location.hash = "";

    window.location.href = "?reload=1";
    return token;
  }

  return localStorage.getItem("discord_token");
}

/* LOGIN / LOGOUT */
function atualizarBotaoLogin(user) {
  const btn = document.getElementById("loginText");
  const menu = document.getElementById("menu");

  if (!btn || !menu) return; // 🔥 proteção

  if (user) {
    btn.innerText = "Minha Conta";
    menu.innerHTML = `
      <div style="margin-bottom:8px;">${user.username}</div>
      <div onclick="logout()">Remover conta</div>
    `;
  } else {
    btn.innerText = "Login";
    menu.innerHTML = `
      <div onclick="loginDiscord()">Entrar com Discord</div>
    `;
  }
}

function logout() {
  localStorage.removeItem("discord_token");
  location.reload();
}

/* MENU */
function toggleMenu() {
  const token = localStorage.getItem("discord_token");

  if (!token) {
    loginDiscord();
    return;
  }

  const menu = document.getElementById("menu");
  if (!menu) return;

  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

/* PEGAR DISCORD */
async function pegarUsuarioDiscord() {
  const token = pegarToken();

  if (!token) {
    atualizarBotaoLogin(null);
    return;
  }

  try {
    const res = await fetch("https://discord.com/api/users/@me", {
      headers: { Authorization: "Bearer " + token }
    });

    const user = await res.json();
    usuarioLogado = user;

    atualizarBotaoLogin(user);

  } catch {
    atualizarBotaoLogin(null);
  }
}

/* ID */
function pegarID() {
  const url = new URL(window.location.href);
  return url.searchParams.get("id");
}

/* 🔥 PERFIL */
async function carregarPerfil(id) {
  try {
    const res = await fetch(API + "/perfil/" + id);

    if (!res.ok) throw new Error("Erro API");

    const data = await res.json();

    if (!data || data.erro) throw new Error("Sem dados");

    const avatar = document.getElementById("avatar");
    const nome = document.getElementById("nome");
    const total = document.getElementById("total");
    const vip = document.getElementById("vip");
    const posicao = document.getElementById("posicao");

    if (!avatar || !nome || !total || !vip) return; // 🔥 proteção

    avatar.src = data.avatar || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
    nome.innerText = data.nome || "Sem nome";
    total.innerText = "R$" + (data.total || 0);
    vip.innerText = data.vip || "Nenhum";

    if (posicao && data.posicao) {
      posicao.innerText = "#" + data.posicao + " no ranking";
    }

  } catch (err) {

    const perfil = document.getElementById("perfil");
    if (!perfil) return;

    perfil.innerHTML = `
      <div style="margin-top:50px;">
        <h2>Erro ao carregar usuário</h2>
        <p>ID: ${id}</p>
        <div class="botao" onclick="voltar()">Voltar ao Ranking</div>
      </div>
    `;
  }
}

/* RANKING */
async function carregarRanking() {
  try {
    const res = await fetch(API + "/ranking");

    if (!res.ok) throw new Error("Erro ranking");

    const data = await res.json();

    const div = document.getElementById("ranking");
    if (!div) return; // 🔥 proteção

    div.innerHTML = "";

    data.forEach((user, i) => {
      div.innerHTML += `
        <div class="item" onclick="abrir('${user.id}')">
          ${i+1}. ${user.nome} - R$${user.total}
        </div>
      `;
    });

  } catch {
    const div = document.getElementById("ranking");
    if (div) div.innerText = "Erro ao carregar ranking";
  }
}

/* NAVEGAÇÃO */
function abrir(id) {
  window.location.href = "?id=" + id;
}

function voltar() {
  window.location.href = "/";
}

/* LOGIN */
function loginDiscord() {
  window.location.href =
    "https://discord.com/oauth2/authorize" +
    "?client_id=1485623307364466861" +
    "&response_type=token" +
    "&scope=identify" +
    "&redirect_uri=" + encodeURIComponent(window.location.origin + "?reload=1");
}

/* 🔥 ATUALIZAÇÃO AUTOMÁTICA */
window.addEventListener("focus", () => {
  if (!pegarID()) carregarRanking();
});

window.addEventListener("pageshow", () => {
  if (!pegarID()) carregarRanking();
});

/* 🔥 GARANTE QUE O DOM CARREGOU */
window.addEventListener("DOMContentLoaded", () => {

  const id = pegarID();

  if (id) {
    const ranking = document.getElementById("ranking");
    if (ranking) ranking.style.display = "none";

    carregarPerfil(id);
  } else {
    const perfil = document.getElementById("perfil");
    if (perfil) perfil.style.display = "none";

    carregarRanking();
  }

  pegarUsuarioDiscord();
});
</script>
