<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Kaio Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#071a2f, #020c18);
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 25px 35px;
  align-items: center;
}

.logo {
  font-size: 34px;
  font-weight: bold;
}

.login {
  background: #2b4d7c;
  padding: 14px 26px;
  border-radius: 14px;
  cursor: pointer;
  font-size: 18px;
  position: relative;
}

/* MENU */
.menu {
  position: absolute;
  top: 60px;
  right: 0;
  background: #1a2f4d;
  border-radius: 10px;
  display: none;
  padding: 10px;
}

.menu div {
  padding: 8px 12px;
  cursor: pointer;
}

.menu div:hover {
  background: #2b4d7c;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 60px;
  text-align: center;
}

.avatar {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  border: 6px solid gold;
  margin-bottom: 10px;
}

.nome {
  font-size: 34px;
  font-weight: bold;
}

.posicao {
  color: gold;
  font-size: 20px;
  margin-bottom: 20px;
}

/* 🔥 VOLTADO AO TAMANHO NORMAL */
.card {
  width: 92%;
  max-width: 480px;
  padding: 24px;
  border-radius: 18px;
  margin: 6px 0;
  text-align: center;
  font-size: 20px;
}

.gasto {
  background: #1e3a5f;
}

.vip {
  background: linear-gradient(45deg, #8a6d1d, #cfa62f);
}

.botao {
  margin-top: 18px;
  width: 95%;
  max-width: 600px;
  padding: 20px;
  border-radius: 16px;
  background: #3d5c86;
  cursor: pointer;
  font-size: 20px;
  text-align: center;
}

.ranking {
  margin-top: 40px;
  text-align: center;
}

.item {
  margin: 10px auto;
  padding: 14px;
  width: 92%;
  max-width: 480px;
  background: #1a2f4d;
  border-radius: 12px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <div class="logo">Kaio Store</div>

  <div class="login" onclick="toggleMenu()">
    <span id="loginText">Minha Conta</span>
    
    <div class="menu" id="menu">
      <div onclick="logout()">Remover conta</div>
    </div>
  </div>
</header>

<div class="container" id="perfil">
  <img class="avatar" id="avatar">
  <div class="nome" id="nome">Carregando...</div>
  <div class="posicao" id="posicao"></div>

  <div class="card gasto">
    💰 Total gasto
    <div id="total">R$0</div>
  </div>

  <div class="card vip">
    👑 VIP atual
    <div id="vip">Carregando</div>
  </div>

  <div class="botao" onclick="voltar()">Voltar ao Ranking</div>
</div>

<div class="ranking" id="ranking"></div>

<script>
const API = "https://attractive-analysis-production-b8e2.up.railway.app";

let usuarioLogado = null;

/* TOKEN */
function pegarToken() {
  const hash = window.location.hash;

  if (hash.includes("access_token")) {
    const params = new URLSearchParams(hash.substring(1));
    const token = params.get("access_token");

    localStorage.setItem("discord_token", token);
    window.location.hash = "";
    return token;
  }

  return localStorage.getItem("discord_token");
}

/* LOGIN / LOGOUT */
function atualizarBotaoLogin(user) {
  const btn = document.getElementById("loginText");
  const menu = document.getElementById("menu");

  if (user) {
    btn.innerText = "Minha Conta";
    menu.innerHTML = `
      <div style="margin-bottom:8px;">${user.username}</div>
      <div onclick="logout()">Remover conta</div>
    `;
  } else {
    btn.innerText = "Login";
    menu.innerHTML = `
      <div onclick="loginDiscord()">Entrar com Discord</div>
    `;
  }
}

function logout() {
  localStorage.removeItem("discord_token");
  location.href = "/";
}

/* MENU */
function toggleMenu() {
  const token = localStorage.getItem("discord_token");

  // 🔥 se não tiver logado → abre login direto
  if (!token) {
    loginDiscord();
    return;
  }

  const menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

/* PEGAR DISCORD */
async function pegarUsuarioDiscord() {
  const token = pegarToken();

  if (!token) {
    atualizarBotaoLogin(null);
    return;
  }

  try {
    const res = await fetch("https://discord.com/api/users/@me", {
      headers: { Authorization: "Bearer " + token }
    });

    const user = await res.json();
    usuarioLogado = user;

    atualizarBotaoLogin(user);

  } catch {
    atualizarBotaoLogin(null);
  }
}

/* ID */
function pegarID() {
  const url = new URL(window.location.href);
  return url.searchParams.get("id");
}

/* PERFIL */
async function carregarPerfil(id) {
  try {
    const res = await fetch(API + "/perfil/" + id);
    const data = await res.json();

    if (data && data.nome) {
      document.getElementById("avatar").src = data.avatar;
      document.getElementById("nome").innerText = data.nome;
      document.getElementById("total").innerText = "R$" + data.total;
      document.getElementById("vip").innerText = data.vip;

      if (data.posicao) {
        document.getElementById("posicao").innerText = "#" + data.posicao + " no ranking";
      }

      return;
    }
  } catch {}

  /* FALLBACK */
  document.getElementById("nome").innerText = "Usuário não encontrado";
  document.getElementById("avatar").src = "https://cdn-icons-png.flaticon.com/512/149/149071.png";
  document.getElementById("total").innerText = "R$0";
  document.getElementById("vip").innerText = "Nenhum";
}

/* RANKING */
async function carregarRanking() {
  try {
    const res = await fetch(API + "/ranking");
    const data = await res.json();

    const div = document.getElementById("ranking");
    div.innerHTML = "";

    data.forEach((user, i) => {
      div.innerHTML += `
        <div class="item" onclick="abrir('${user.id}')">
          ${i+1}. ${user.nome} - R$${user.total}
        </div>
      `;
    });

  } catch {
    document.getElementById("ranking").innerText = "Erro ao carregar ranking";
  }
}

/* NAVEGAÇÃO */
function abrir(id) {
  window.location.href = "?id=" + id;
}

function voltar() {
  window.location.href = "/";
}

/* LOGIN */
function loginDiscord() {
  window.location.href =
    "https://discord.com/oauth2/authorize" +
    "?client_id=1485623307364466861" +
    "&response_type=token" +
    "&scope=identify" +
    "&redirect_uri=" + encodeURIComponent(window.location.origin);
}

/* INICIO */
const id = pegarID();

if (id) {
  document.getElementById("ranking").style.display = "none";
  carregarPerfil(id);
} else {
  document.getElementById("perfil").style.display = "none";
  carregarRanking();
}

pegarUsuarioDiscord();
</script>

</body>
</html>
