<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Kaio Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
  text-align: center;
}

/* TOPO */
.topo {
  display: flex;
  justify-content: flex-start;
  align-items: center;
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
}

/* PERFIL */
.perfil-box {
  margin-top: 40px;
}

/* AVATAR */
#avatar {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  border: 3px solid #333;
}

/* NOME */
#nome {
  margin-top: 15px;
  font-size: 26px;
}

/* POSIÇÃO */
#posicao {
  color: #aaa;
  margin-bottom: 20px;
}

/* CARDS */
.card {
  width: 85%;
  max-width: 420px;
  margin: 15px auto;
  padding: 20px;
  border-radius: 14px;
  font-size: 18px;
}

/* CARD PRETO */
.card-azul {
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
}

/* CARD CINZA */
.card-dourado {
  background: #222;
  border: 1px solid #333;
}

/* HOVER PREMIUM */
.card:hover {
  box-shadow: 0 0 20px rgba(255,255,255,0.05);
  transform: scale(1.02);
  transition: 0.2s;
}
</style>

</head>

<body>

<!-- TOPO -->
<div class="topo">
  Kaio Store
</div>

<!-- PERFIL -->
<div id="perfil" class="perfil-box">

  <img id="avatar">

  <h1 id="nome"></h1>
  <p id="posicao"></p>

  <div class="card card-azul">
    💰 Total gasto<br>
    <span id="total"></span>
  </div>

  <div class="card card-dourado">
    👑 VIP atual<br>
    <span id="vip"></span>
  </div>

</div>

<script>
const API = "https://attractive-analysis-production-b8e2.up.railway.app";

/* PEGAR ID */
function pegarID() {
  const url = new URL(window.location.href);
  return url.searchParams.get("id");
}

/* CARREGAR PERFIL */
async function carregarPerfil(id) {
  try {
    const res = await fetch(API + "/perfil/" + id);
    const data = await res.json();

    document.getElementById("avatar").src = data.avatar;
    document.getElementById("nome").innerText = data.nome;
    document.getElementById("total").innerText = "R$" + data.total;
    document.getElementById("vip").innerText = data.vip || "Sem cargo";
    document.getElementById("posicao").innerText = "#" + data.posicao + " no ranking";

  } catch {
    document.getElementById("perfil").innerText = "Erro ao carregar";
  }
}

/* START */
window.addEventListener("DOMContentLoaded", () => {
  const id = pegarID();

  if (id) {
    carregarPerfil(id);
  } else {
    document.getElementById("perfil").innerHTML = "<h2>Nenhum usuário selecionado</h2>";
  }
});
</script>

</body>
</html>
