<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaio Store</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #0a1a3a, #020617);
  color: white;
}

/* TOPO */
.topo {
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

.topo h1 {
  font-size: 22px;
}

.botao-topo {
  background: #0f2a4d;
  padding: 10px 15px;
  border-radius: 8px;
}

/* CONTAINER CENTRAL */
.container {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  margin-top: 80px;
}

/* CARD PRINCIPAL */
.card {
  background: #0b0f1a;
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  width: 350px;
  box-shadow: 0 0 40px rgba(0, 140, 255, 0.3);
}

/* FOTO */
.avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 4px solid gold;
  margin-bottom: 10px;
}

/* COROA */
.coroa {
  font-size: 30px;
}

/* NOME */
.nome {
  font-size: 26px;
  margin: 10px 0;
}

/* POSIÇÃO */
.rank {
  color: gold;
  margin-bottom: 20px;
}

/* CAIXAS */
.info {
  display: flex;
  justify-content: space-between;
  gap: 15px;
}

.box {
  flex: 1;
  padding: 20px;
  border-radius: 12px;
}

.gasto {
  background: rgba(0, 140, 255, 0.2);
  box-shadow: 0 0 15px rgba(0, 140, 255, 0.5);
}

.vip {
  background: rgba(255, 180, 0, 0.2);
  box-shadow: 0 0 15px rgba(255, 180, 0, 0.5);
}

/* BOTÃO */
.botao {
  margin-top: 20px;
  background: #0f2a4d;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="topo">
  <h1>Kaio Store</h1>
  <div class="botao-topo">Minha Conta</div>
</div>

<div class="container">
  <div class="card">

    <div class="coroa">👑</div>

    <img src="https://cdn.discordapp.com/embed/avatars/0.png" class="avatar">

    <div class="nome" id="nome">Usuario</div>
    <div class="rank">#1 no ranking</div>

    <div class="info">
      <div class="box gasto">
        <div>Total gasto:</div>
        <strong id="gasto">R$0</strong>
      </div>

      <div class="box vip">
        <div>VIP atual:</div>
        <strong id="vip">Bronze</strong>
      </div>
    </div>

    <div class="botao" onclick="voltar()">Voltar ao Ranking</div>

  </div>
</div>

<script>
function voltar() {
  window.location.href = "https://discord.com";
}

// SIMULAÇÃO (depois a gente puxa do bot)
document.getElementById("nome").innerText = "legal07397";
document.getElementById("gasto").innerText = "R$1.800";
document.getElementById("vip").innerText = "Diamante";
</script>

</body>
</html>
