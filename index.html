<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaio Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at center, #0a1a3a, #020617);
  color: white;
}

/* TOPO /
.topo {
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

.botao-topo {
  background: #0f2a4d;
  padding: 10px 15px;
  border-radius: 8px;
  cursor: pointer;
}

/ CENTRO /
.container {
  display: flex;
  justify-content: center;
  margin-top: 60px;
}

/ CARD /
.card {
  background: #0b0f1a;
  padding: 50px;
  border-radius: 20px;
  text-align: center;
  width: 380px;
  box-shadow: 0 0 50px rgba(0,140,255,0.4);
}

/ AVATAR /
.avatar {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  border: 4px solid gold;
}

/ COROA /
.coroa {
  font-size: 28px;
}

/ TEXTO /
.nome {
  font-size: 28px;
  margin-top: 10px;
}

.rank {
  color: gold;
  margin-bottom: 20px;
}

/ BOX /
.info {
  display: flex;
  gap: 15px;
}

.box {
  flex: 1;
  padding: 20px;
  border-radius: 12px;
}

.gasto {
  background: rgba(0,140,255,0.2);
  box-shadow: 0 0 15px rgba(0,140,255,0.6);
}

.vip {
  background: rgba(255,180,0,0.2);
  box-shadow: 0 0 15px rgba(255,180,0,0.6);
}

/ BOTÃO */
.botao {
  margin-top: 20px;
  background: #0f2a4d;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.botao:hover {
  background: #163b6b;
}
</style>
</head>

<body>

<div class="topo">
  <h2>Kaio Store</h2>
  <div class="botao-topo" onclick="minhaConta()">Minha Conta</div>
</div>

<div class="container">
  <div class="card">

    <div class="coroa" id="coroa"></div>

    <img id="avatar" class="avatar" src="https://cdn.discordapp.com/embed/avatars/0.png">

    <div class="nome" id="nome">Carregando...</div>
    <div class="rank" id="rank"></div>

    <div class="info">
      <div class="box gasto">
        <div>Total gasto:</div>
        <strong id="gasto">R$0</strong>
      </div>

      <div class="box vip">
        <div>VIP atual:</div>
        <strong id="vip">...</strong>
      </div>
    </div>

    <div class="botao" onclick="voltar()">Voltar ao Ranking</div>

  </div>
</div>

<script>

// 🔥 ALTERA AQUI (TESTE)
let usuario = {
  nome: "legal07397",
  gasto: 80, // muda aqui
  avatar: "https://cdn.discordapp.com/embed/avatars/0.png",
  posicao: 1
};

// 🔥 VIP COM PRATA
function calcularVIP(valor) {
  if (valor >= 1000) return "Diamante";
  if (valor >= 500) return "Ouro";
  if (valor >= 300) return "Prata";
  if (valor >= 100) return "Bronze";
  return null;
}

// APLICAR
document.getElementById("nome").innerText = usuario.nome;
document.getElementById("gasto").innerText = "R$" + usuario.gasto;
document.getElementById("avatar").src = usuario.avatar;

// VIP
let vip = calcularVIP(usuario.gasto);

if (vip === null) {
  document.getElementById("vip").innerText = "Ainda sem cargo";
} else {
  document.getElementById("vip").innerText = vip;
}

// RANK
if (usuario.posicao === 1) {
  document.getElementById("rank").innerText = "#1 no ranking";
  document.getElementById("coroa").innerText = "👑";
} else {
  document.getElementById("rank").innerText = "#" + usuario.posicao + " no ranking";
}

// BOTÕES
function voltar() {
  window.location.href = "https://discord.com"; // coloca seu link
}

function minhaConta() {
  alert("Perfil em breve");
}

</script>

</body>
</html>
