<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Kaio Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

/* TOPO */
.topo {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px;
}

.topo h2 {
  font-size: 22px;
}

.login-btn {
  background: #1c1c1c;
  padding: 10px 16px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 15px;
}

/* MENU */
#menu {
  position: absolute;
  right: 18px;
  top: 60px;
  background: #111;
  border-radius: 10px;
  padding: 10px;
  display: none;
}

#menu div {
  padding: 8px;
  cursor: pointer;
}

/* PERFIL */
.perfil {
  text-align: center;
  margin-top: 30px;
}

.perfil img {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 3px solid gold;
}

.nome {
  font-size: 22px;
  margin-top: 10px;
}

.posicao {
  font-size: 14px;
  opacity: 0.7;
}

/* CARDS */
.card {
  margin: 15px auto;
  padding: 18px;
  width: 90%;
  max-width: 380px;
  border-radius: 14px;
  font-size: 16px;
}

.azul {
  background: #1c1f26;
}

.dourado {
  background: #c89b2c;
  color: black;
}

/* BOTAO */
.botao {
  background: #1c1c1c;
  margin: 20px auto;
  padding: 14px;
  width: 90%;
  max-width: 380px;
  border-radius: 12px;
  cursor: pointer;
}

/* RANK */
.rank-item {
  background: #1c1f26;
  margin: 12px auto;
  padding: 16px;
  width: 90%;
  max-width: 380px;
  border-radius: 12px;
  cursor: pointer;
  text-align: center;
}
</style>

</head>
<body>

<div class="topo">
  <h2>Kaio Store</h2>
  <div class="login-btn" id="loginText" onclick="toggleMenu()">Login</div>
</div>

<div id="menu"></div>

<div id="conteudo"></div>

<script>
const API = "https://attractive-analysis-production-b8e2.up.railway.app";

let usuarioLogado = null;

/* TOKEN */
function pegarToken() {
  const hash = window.location.hash;

  if (hash.includes("access_token")) {
    const params = new URLSearchParams(hash.substring(1));
    const token = params.get("access_token");

    localStorage.setItem("discord_token", token);
    window.location.hash = "";
    window.location.href = window.location.pathname + window.location.search;
    return token;
  }

  return localStorage.getItem("discord_token");
}

/* LOGIN BOTAO */
function atualizarBotaoLogin(user) {
  const btn = document.getElementById("loginText");
  const menu = document.getElementById("menu");

  if (user) {
    btn.innerText = "Minha Conta";
    menu.innerHTML = `
      <div>${user.username}</div>
      <div onclick="logout()">Sair</div>
    `;
  } else {
    btn.innerText = "Login";
    menu.innerHTML = `
      <div onclick="loginDiscord()">Entrar com Discord</div>
    `;
  }
}

function toggleMenu() {
  const token = localStorage.getItem("discord_token");

  if (!token) {
    loginDiscord();
    return;
  }

  const menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function logout() {
  localStorage.removeItem("discord_token");
  location.reload();
}

/* DISCORD USER */
async function pegarUsuarioDiscord() {
  const token = pegarToken();

  if (!token) {
    atualizarBotaoLogin(null);
    return;
  }

  try {
    const res = await fetch("https://discord.com/api/users/@me", {
      headers: { Authorization: "Bearer " + token }
    });

    const user = await res.json();
    usuarioLogado = user;

    atualizarBotaoLogin(user);

    const url = new URL(window.location.href);
    const id = url.searchParams.get("id");

    if (!id) {
      carregarPerfil(user.id);
    }

  } catch {
    atualizarBotaoLogin(null);
  }
}

/* PERFIL */
async function carregarPerfil(id) {
  try {
    const res = await fetch(API + "/perfil/" + id);
    const data = await res.json();

    document.getElementById("conteudo").innerHTML = `
      <div class="perfil">
        <img src="${data.avatar}">
        <div class="nome">${data.nome}</div>
        <div class="posicao">#${data.posicao} no ranking</div>

        <div class="card azul">
          💰 Total gasto<br><b>R$${data.total}</b>
        </div>

        <div class="card dourado">
          👑 VIP atual<br><b>${data.vip || "Sem cargo"}</b>
        </div>

        <div class="botao" onclick="voltarRanking()">
          Voltar pro ranking
        </div>
      </div>
    `;

  } catch {
    document.getElementById("conteudo").innerText = "Erro ao carregar perfil";
  }
}

/* RANKING */
async function carregarRanking() {
  try {
    const res = await fetch(API + "/ranking");
    const data = await res.json();

    let html = "";

    data.forEach((user, i) => {
      html += `
        <div class="rank-item" onclick="abrir('${user.id}')">
          ${i+1}. ${user.nome} - R$${user.total}
        </div>
      `;
    });

    document.getElementById("conteudo").innerHTML = html;

  } catch {
    document.getElementById("conteudo").innerText = "Erro ao carregar ranking";
  }
}

/* NAV */
function abrir(id) {
  window.location.href = "?id=" + id;
}

function voltarRanking() {
  window.location.href = "/";
}

/* LOGIN DISCORD */
function loginDiscord() {
  window.location.href =
    "https://discord.com/oauth2/authorize" +
    "?client_id=1485623307364466861" +
    "&response_type=token" +
    "&scope=identify" +
    "&redirect_uri=" + encodeURIComponent(window.location.origin);
}

/* START */
window.addEventListener("DOMContentLoaded", () => {

  const url = new URL(window.location.href);
  const id = url.searchParams.get("id");

  if (id) {
    carregarPerfil(id);
  } else {
    carregarRanking();
  }

  pegarUsuarioDiscord();
});
</script>

</body>
</html>
