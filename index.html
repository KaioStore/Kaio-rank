<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Perfil</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a2540;
  color: white;
  text-align: center;
}

/* TOPO */
.topo {
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

.botao {
  background: #243a5a;
  padding: 10px 15px;
  border-radius: 10px;
  cursor: pointer;
}

/* MENU */
#menu {
  display: none;
  position: absolute;
  right: 20px;
  top: 70px;
  background: #243a5a;
  padding: 10px;
  border-radius: 10px;
}

/* PERFIL */
.perfil-box {
  margin-top: 40px;
}

#avatar {
  width: 120px;
  border-radius: 50%;
  border: 4px solid gold;
}

/* CARDS */
.card {
  margin: 20px auto;
  width: 90%;
  max-width: 400px;
  padding: 25px;
  border-radius: 18px;
  font-size: 18px;
}

.card-azul {
  background: #243a5a;
}

.card-dourado {
  background: #c9a227;
  color: black;
}
</style>

</head>

<body>

<!-- TOPO -->
<div class="topo">
  <div></div>

  <div onclick="toggleMenu()" class="botao" id="loginText">
    Login
  </div>
</div>

<div id="menu"></div>

<!-- PERFIL -->
<div id="perfil" class="perfil-box">

  <img id="avatar">

  <h1 id="nome"></h1>
  <p id="posicao"></p>

  <div class="card card-azul">
    💰 Total gasto<br>
    <span id="total"></span>
  </div>

  <div class="card card-dourado">
    👑 VIP atual<br>
    <span id="vip"></span>
  </div>

</div>

<script>
const API = "https://attractive-analysis-production-b8e2.up.railway.app";

/* TOKEN */
function pegarToken() {
  const hash = window.location.hash;

  if (hash.includes("access_token")) {
    const params = new URLSearchParams(hash.substring(1));
    const token = params.get("access_token");

    localStorage.setItem("discord_token", token);

    // remove bug de reload
    window.history.replaceState({}, document.title, "/");

    return token;
  }

  return localStorage.getItem("discord_token");
}

/* LOGIN */
function atualizarBotaoLogin(user) {
  const btn = document.getElementById("loginText");
  const menu = document.getElementById("menu");

  if (!btn || !menu) return;

  if (user) {
    btn.innerText = "Minha Conta";

    menu.innerHTML = `
      <div style="margin-bottom:8px;">${user.username}</div>
      <div onclick="logout()">Sair</div>
    `;
  } else {
    btn.innerText = "Login";

    menu.innerHTML = `
      <div onclick="loginDiscord()">Entrar com Discord</div>
    `;
  }
}

function logout() {
  localStorage.removeItem("discord_token");
  location.reload();
}

/* MENU */
function toggleMenu() {
  const menu = document.getElementById("menu");

  menu.style.display =
    menu.style.display === "block" ? "none" : "block";
}

/* DISCORD */
async function pegarUsuarioDiscord() {
  const token = pegarToken();

  if (!token) {
    atualizarBotaoLogin(null);
    return;
  }

  try {
    const res = await fetch("https://discord.com/api/users/@me", {
      headers: { Authorization: "Bearer " + token }
    });

    const user = await res.json();
    atualizarBotaoLogin(user);

  } catch {
    atualizarBotaoLogin(null);
  }
}

/* PERFIL */
async function carregarPerfil(id) {
  try {
    const res = await fetch(API + "/perfil/" + id);
    const data = await res.json();

    document.getElementById("avatar").src = data.avatar;
    document.getElementById("nome").innerText = data.nome;
    document.getElementById("total").innerText = "R$" + data.total;
    document.getElementById("vip").innerText = data.vip;
    document.getElementById("posicao").innerText =
      "#" + data.posicao + " no ranking";

  } catch {
    document.getElementById("perfil").innerText = "Erro ao carregar";
  }
}

/* LOGIN DISCORD */
function loginDiscord() {
  window.location.href =
    "https://discord.com/oauth2/authorize" +
    "?client_id=1485623307364466861" +
    "&response_type=token" +
    "&scope=identify" +
    "&redirect_uri=" + encodeURIComponent(window.location.origin);
}

/* START */
window.addEventListener("DOMContentLoaded", () => {

  pegarToken();

  // 🔥 ID FIXO (SEMPRE MOSTRA PERFIL)
  carregarPerfil("1470520684127191304");

  pegarUsuarioDiscord();
});
</script>

</body>
</html>
