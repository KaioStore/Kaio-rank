<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Kaio Store</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0a; /* FUNDO LISO PRETO */
  color: white;
}

/* TOPO */
.topo {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
}

.topo h2 {
  font-size: 26px; /* MAIOR */
  font-weight: bold;
}

.botao {
  background: #1c1c1c;
  padding: 12px 18px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
}

/* MENU */
#menu {
  position: absolute;
  right: 20px;
  top: 70px;
  background: #1c1c1c;
  padding: 10px;
  border-radius: 10px;
  display: none;
}

/* PERFIL */
.perfil-box {
  text-align: center;
  margin-top: 40px;
}

#avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 4px solid gold;
}

/* NOME */
#nome {
  font-size: 24px;
  margin-top: 10px;
}

/* POSIÇÃO */
#posicao {
  color: #aaa;
  margin-bottom: 20px;
}

/* CARDS */
.card {
  margin: 12px auto;
  padding: 18px;
  width: 85%;
  max-width: 350px;
  border-radius: 14px;
  font-size: 17px;
}

.card-azul {
  background: #1c1c1c;
}

.card-dourado {
  background: #b8921e;
  color: black;
}

</style>

</head>

<body>

<!-- TOPO -->
<div class="topo">
  <h2>Kaio Store</h2>

  <div onclick="toggleMenu()" class="botao" id="loginText">
    Login
  </div>
</div>

<div id="menu"></div>

<!-- PERFIL -->
<div id="perfil" class="perfil-box">

  <img id="avatar">

  <h1 id="nome"></h1>
  <p id="posicao"></p>

  <div class="card card-azul">
    💰 Total gasto<br>
    <span id="total"></span>
  </div>

  <div class="card card-dourado">
    👑 VIP atual<br>
    <span id="vip"></span>
  </div>

</div>

<script>
const API = "https://attractive-analysis-production-b8e2.up.railway.app";

/* TOKEN */
function pegarToken() {
  const hash = window.location.hash;

  if (hash.includes("access_token")) {
    const params = new URLSearchParams(hash.substring(1));
    const token = params.get("access_token");

    localStorage.setItem("discord_token", token);
    window.location.hash = "";
    location.reload();
    return token;
  }

  return localStorage.getItem("discord_token");
}

/* LOGIN BOTÃO */
function atualizarBotaoLogin(user) {
  const btn = document.getElementById("loginText");
  const menu = document.getElementById("menu");

  if (user) {
    btn.innerText = "Minha Conta";
    menu.innerHTML = `
      <div>${user.username}</div>
      <div onclick="logout()">Sair</div>
    `;
  } else {
    btn.innerText = "Login";
    menu.innerHTML = `
      <div onclick="loginDiscord()">Entrar com Discord</div>
    `;
  }
}

function toggleMenu() {
  const menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function logout() {
  localStorage.removeItem("discord_token");
  location.reload();
}

/* USUÁRIO DISCORD */
async function pegarUsuarioDiscord() {
  const token = pegarToken();

  if (!token) {
    atualizarBotaoLogin(null);
    return;
  }

  try {
    const res = await fetch("https://discord.com/api/users/@me", {
      headers: { Authorization: "Bearer " + token }
    });

    const user = await res.json();

    atualizarBotaoLogin(user);

    /* CARREGAR PERFIL AUTOMÁTICO */
    carregarPerfil(user.id, user);

  } catch {
    atualizarBotaoLogin(null);
  }
}

/* PERFIL */
async function carregarPerfil(id, discordUser = null) {
  try {
    const res = await fetch(API + "/perfil/" + id);
    const data = await res.json();

    /* AVATAR CORRIGIDO */
    if (discordUser && discordUser.avatar) {
      document.getElementById("avatar").src =
        `https://cdn.discordapp.com/avatars/${discordUser.id}/${discordUser.avatar}.png`;
    } else {
      document.getElementById("avatar").src = data.avatar;
    }

    document.getElementById("nome").innerText = data.nome;
    document.getElementById("total").innerText = "R$" + data.total;
    document.getElementById("vip").innerText = data.vip || "Sem cargo";
    document.getElementById("posicao").innerText = "#" + data.posicao + " no ranking";

  } catch {
    document.getElementById("perfil").innerText = "Erro ao carregar";
  }
}

/* LOGIN DISCORD */
function loginDiscord() {
  window.location.href =
    "https://discord.com/oauth2/authorize" +
    "?client_id=1485623307364466861" +
    "&response_type=token" +
    "&scope=identify" +
    "&redirect_uri=" + encodeURIComponent(window.location.origin);
}

/* START */
window.addEventListener("DOMContentLoaded", () => {
  pegarUsuarioDiscord();
});
</script>

</body>
</html>
